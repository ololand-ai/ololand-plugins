name: ololand-dd
version: 1.20.4
displayName: OloLand DD
category: Productivity
description: >-
  Institutional due diligence for Claude — deterministic DCF / LBO / Monte
  Carlo / Real Options engines, 246-category risk taxonomy with SaaS /
  healthcare / real-estate / industrial overlays, forensic QoE primitives,
  cross-document reconciliation (CPA > tax > management > AI), MaskablePPO
  war-game simulation, assumption controls that gate IC approval,
  analytical workbench tools for QoE/compliance/scenarios/earnings, value-impact
  ledger reads, deal-health actions, workbooks, company discovery, watchlists,
  IC-package lifecycle dispatch, advisory requests, verified forensic screen
  marketplace support, and a regulator-grade audit trail with replay and
  compliance-framework exports. Three sub-agents (dd-analyst, forensic-screener,
  war-game-strategist) plus a flywheel that retrains from analyst corrections.
  Counter-positions Anthropic's native private-equity plugin.
shortDescription: Institutional due diligence for M&A and private equity.
developerName: OloLand
homepage: https://ololand.ai
repository: https://github.com/ololand-ai/ololand-plugins
license: Apache-2.0
keywords:
  - finance
  - private-equity
  - due-diligence
  - m-and-a
  - valuation
  - lbo
  - dcf
  - risk-analysis
  - forensic-qoe
capabilities:
  - Read
  - Write
  - Interactive
defaultPrompt:
  - Run due diligence on the sample deal.
  - Build a risk report for a deal.
  - Run valuation with sensitivity analysis.
targets:
  claude: true
  codex: true
codex:
  # Disabled 2026-05-21 to keep ololand-dd under Cowork's per-plugin install
  # cap. With 31 commands + 52 skills, Cowork's marketplace ingest was
  # cascading into "skills-only minimal mode" — stripping commands/, agents/,
  # and .mcp.json, and truncating skills/ to ~23. Codex users keep slash
  # commands via commands/*.md; the cmd-* skill wrappers were duplicates.
  generateCommandSkills: false
interface:
  websiteURL: https://ololand.ai
  privacyPolicyURL: https://ololand.ai/privacy
  termsOfServiceURL: https://ololand.ai/terms
  brandColor: "#0F766E"
