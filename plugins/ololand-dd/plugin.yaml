name: ololand-dd
version: 1.12.0
displayName: OloLand DD
category: Productivity
description: >-
  Institutional due diligence for Claude — deterministic DCF / LBO / Monte
  Carlo / Real Options engines, 246-category risk taxonomy with industry
  overlays, forensic QoE primitives (Beneish, Benford, EBITDA bridge,
  journal-entry testing, lapping detection), cross-document reconciliation with
  source hierarchy (CPA > tax > management > AI), MaskablePPO war-game
  competitive simulation, middle-office assumption controls that gate IC
  approval, observability M1+M2 audit trail (agent_runs, agent_spans,
  regulator-grade replay, compliance-framework exports), OloNet
  competitive-intel feed (gateway-ingested AI financial-services moves), and a
  flywheel that retrains from analyst corrections. Three sub-agents:
  dd-analyst, forensic-screener (Pre-LOI 7-primitive forensic battery),
  war-game-strategist (16-quarter competitive simulation). Twenty-seven
  commands including /verify, /remember and /recall (persistent deal record),
  /inspect-run, /replay-run, /regulator-export (observability + regulator
  defense), /plan (pre-execution plan review before the executor fires),
  /ai-finserv-moves (browse OloNet competitive-intel feed), /pre-screen,
  /ic-memo-skeptical, /assumption-controls, /ic-approve-readiness,
  /playbook-recall, and /calibrate-vs-history. Counter-positions Anthropic's
  native private-equity plugin.
shortDescription: Institutional due diligence for M&A and private equity.
developerName: OloLand
homepage: https://ololand.ai
repository: https://github.com/ololand-ai/ololand-plugins
license: Apache-2.0
keywords:
  - finance
  - private-equity
  - due-diligence
  - m-and-a
  - valuation
  - lbo
  - dcf
  - risk-analysis
  - forensic-qoe
capabilities:
  - Read
  - Write
  - Interactive
defaultPrompt:
  - Run due diligence on the sample deal.
  - Build a risk report for a deal.
  - Run valuation with sensitivity analysis.
targets:
  claude: true
  codex: true
interface:
  websiteURL: https://ololand.ai
  privacyPolicyURL: https://ololand.ai/privacy
  termsOfServiceURL: https://ololand.ai/terms
  brandColor: "#0F766E"
